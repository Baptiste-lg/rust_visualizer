<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Audio Visualizer</title>
    <meta name="description" content="Real-time audio visualizer built with Rust and Bevy. Load an audio file or use your microphone.">
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
        html, body {
            margin: 0;

            width: 100% !important;
            height: 100% !important;
            display: block;
        }

</head>
<body>
    <canvas id="bevy-canvas"></canvas>
</body>
</html>
